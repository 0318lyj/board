<!DOCTYPE html>
<html>
<head>
    <title>글쓰기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>{% if post %}글 수정{% else %}글쓰기{% endif %}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label>제목</label>
            <input type="text" name="title" class="form-control" value="{{ post.title|default:'' }}">
        </div>
        <div class="mb-3">
            <label>내용</label>
            <textarea name="content" class="form-control" rows="5">{{ post.content|default:'' }}</textarea>
        </div>
        <div class="mb-3">
            <label>파일 첨부</label>
            <input type="file" name="file" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">저장</button>
        <a href="/posts/" class="btn btn-secondary">취소</a>
    </form>
</div>
</body>
</html>
